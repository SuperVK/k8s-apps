apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: sudosos-prod
  namespace: flux-system
spec:
  interval: 1m
  path: "./k8s/overlays/production"
  prune: true
  sourceRef:
    kind: GitRepository
    name: sudosos
  serviceAccountName: app-deployer
  targetNamespace: sudosos-prod
---
apiVersion: v1
kind: Namespace
metadata:
  name: sudosos-prod
