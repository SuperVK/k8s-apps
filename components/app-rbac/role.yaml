apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-deployer
rules:
  # Core resources
  - apiGroups: [""]
    resources:
      - services
      - configmaps
      - secrets
      - serviceaccounts
      - persistentvolumeclaims
      - pods
    verbs: ["*"]
  # Workloads
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - replicasets
      - daemonsets
    verbs: ["*"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["*"]
  # Networking
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["*"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - httproutes
      - grpcroutes
    verbs: ["*"]
  # Traefik CRDs
  - apiGroups: ["traefik.io"]
    resources:
      - ingressroutes
      - middlewares
      - tlsoptions
      - traefikservices
    verbs: ["*"]
  # Sealed secrets
  - apiGroups: ["bitnami.com"]
    resources:
      - sealedsecrets
    verbs: ["*"]
  # Certificates
  - apiGroups: ["cert-manager.io"]
    resources:
      - certificates
      - issuers
    verbs: ["*"]
  # Databases
  - apiGroups: ["databases.gewis.nl"]
    resources:
      - postgresdatabases
    verbs: ["*"]
  # Autoscaling
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["*"]
  # Policy
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["*"]
